<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="head">
    <img src="assets/logo.svg" alt="Kora" class="wm" />
    <div class="title">Conecte sua conta do Kora<br />para começar</div>
  </div>

  <!-- estado: deslogado -->
  <form id="form" class="form" hidden>
    <label>E-mail<input id="email" type="email" placeholder="exemplo@email.com" autocomplete="username" required /></label>
    <label>Senha<input id="password" type="password" placeholder="Digite sua senha" autocomplete="current-password" required /></label>
    <details class="adv"><summary>Servidor</summary>
      <input id="base" type="url" placeholder="http://localhost:3000" />
    </details>
    <div id="err" class="err" hidden></div>
    <button id="submit" class="btn" type="submit">Conectar</button>
    <div class="hint">Cria um <b>token de dispositivo</b> revogável a qualquer momento em Configurações → Dispositivos.</div>
  </form>

  <!-- estado: logado -->
  <div id="logged" class="logged" hidden>
    <div class="who"><span class="dot"></span><div><b id="who-name"></b><small id="who-tenant"></small></div></div>
    <div class="hint">Abra o <b>WhatsApp Web</b> e use o puxador azul na borda direita.</div>
    <button id="logout" class="btn btn-white" type="button">Sair deste dispositivo</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
